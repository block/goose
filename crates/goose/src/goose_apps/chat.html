<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <script type="application/ld+json">
    {
      "@context": "https://goose.ai/schema",
      "@type": "GooseApp",
      "name": "chat",
      "description": "Simple Chat UI",
      "width": 400,
      "height": 500,
      "resizable": true
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, sans-serif);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
    }

    body { display: flex; flex-direction: column; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: var(--border-radius-lg, 16px);
      line-height: 1.4;
      font-size: 14px;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--color-background-inverse);
      color: var(--color-text-inverse);
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
    }
    .message.loading { font-style: italic; opacity: 0.6; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--color-border-primary);
      background: var(--color-background-secondary);
    }

    #messageInput {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      border: 1px solid var(--color-border-primary);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
    }
    #messageInput:focus { border-color: var(--color-text-info); }

    #sendBtn {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      background: var(--color-background-inverse);
      color: var(--color-text-inverse);
    }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const conversationHistory = [];

    function addMessage(role, text, isLoading = false) {
      const div = document.createElement('div');
      div.className = `message ${role}${isLoading ? ' loading' : ''}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: { type: 'text', text } });

      const loadingEl = addMessage('assistant', 'Thinking...', true);

      try {
        const response = await goose.chat(conversationHistory, {
          systemPrompt: 'You are a helpful assistant. Keep responses concise.',
          maxTokens: 1000,
        });

        const responseText = response.content.text;
        conversationHistory.push({ role: 'assistant', content: { type: 'text', text: responseText } });

        loadingEl.textContent = responseText;
        loadingEl.classList.remove('loading');
      } catch (err) {
        loadingEl.textContent = 'Error: ' + err.message;
        loadingEl.classList.remove('loading');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    goose.onReady = () => inputEl.focus();
  </script>
</body>
</html>
