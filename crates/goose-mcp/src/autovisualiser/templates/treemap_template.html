<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treemap Visualization</title>

    <script>
        {{D3_MIN}}
    </script>

    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f5f5f5;
            --color-text-primary: #333333;
            --color-text-secondary: #666666;
            --font-sans: Arial, sans-serif;
        }

        html, body { overflow: hidden; }

        body {
            font-family: var(--font-sans);
            margin: 0;
            padding: 20px;
            background-color: var(--color-background-secondary);
            color: var(--color-text-primary);
        }

        .container { margin: 0 auto; }
        .treemap-container { padding: 0; }

        .treemap-rect {
            stroke: white; stroke-width: 2px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .treemap-rect:hover { stroke-width: 3px; stroke: #333; filter: brightness(1.1); }

        .treemap-text {
            font-size: 12px; font-weight: 500; fill: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            pointer-events: none; text-anchor: middle; dominant-baseline: middle;
        }
        .treemap-value {
            font-size: 10px; fill: rgba(255,255,255,0.8);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            pointer-events: none; text-anchor: middle; dominant-baseline: middle;
        }
        .group-label { font-size: 14px; font-weight: bold; fill: var(--color-text-primary); pointer-events: none; }

        .tooltip {
            position: absolute; background: rgba(0,0,0,0.9); color: white;
            padding: 10px; border-radius: 5px; font-size: 12px;
            pointer-events: none; z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
        }

        .loading {
            display: flex; align-items: center; justify-content: center;
            height: 400px; color: var(--color-text-secondary); font-size: 1.1em;
        }
        .loading.hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loadingIndicator" class="loading">Waiting for data…</div>
        <div class="treemap-container" id="treemap"></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
    (function() {
        "use strict";

        var nextId = 1;
        var svg, treemap, root;
        var width = 800, height = 500;
        var colorScale = d3.scaleOrdinal(d3.schemeTableau10);

        function sendRequest(method, params) {
            return new Promise(function(resolve, reject) {
                var id = nextId++;
                function handler(event) {
                    if (event.data && event.data.id === id) {
                        window.removeEventListener('message', handler);
                        if (event.data.result) resolve(event.data.result);
                        else if (event.data.error) reject(event.data.error);
                    }
                }
                window.addEventListener('message', handler);
                window.parent.postMessage({ jsonrpc: "2.0", id: id, method: method, params: params }, '*');
            });
        }

        function sendNotification(method, params) {
            window.parent.postMessage({ jsonrpc: "2.0", method: method, params: params }, '*');
        }

        function reportSize() {
            var h = Math.max(document.body.scrollHeight, document.body.offsetHeight,
                document.documentElement.scrollHeight, document.documentElement.offsetHeight);
            sendNotification("ui/notifications/size-changed", { width: document.body.scrollWidth, height: h });
        }

        if (typeof ResizeObserver !== 'undefined') { new ResizeObserver(reportSize).observe(document.body); }
        window.addEventListener('resize', reportSize);

        var currentData = null;

        function applyTheme(hostContext) {
            if (!hostContext) return;
            if (hostContext.theme) document.documentElement.style.colorScheme = hostContext.theme;
            if (hostContext.styles && hostContext.styles.variables) {
                var vars = hostContext.styles.variables;
                for (var key in vars) { if (vars[key]) document.documentElement.style.setProperty(key, vars[key]); }
            }
            if (currentData) renderData(currentData);
        }

        function formatValue(value) {
            if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
            if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
            return value.toLocaleString();
        }

        function initializeTreemap() {
            var container = d3.select("#treemap");
            container.selectAll("*").remove();
            svg = container.append("svg").attr("width", width).attr("height", height).style("font", "10px sans-serif");
            treemap = d3.treemap().size([width, height]).padding(2).round(true);
        }

        function updateTreemap(data) {
            root = d3.hierarchy(data).sum(function(d) { return d.value || 0; }).sort(function(a, b) { return b.value - a.value; });
            treemap(root);
            svg.selectAll("*").remove();

            var leaf = svg.selectAll("g").data(root.leaves()).join("g")
                .attr("transform", function(d) { return "translate(" + d.x0 + "," + d.y0 + ")"; });

            leaf.append("rect").attr("class", "treemap-rect")
                .attr("fill", function(d) { return colorScale(d.data.category || (d.parent ? d.parent.data.name : 'default')); })
                .attr("width", function(d) { return d.x1 - d.x0; }).attr("height", function(d) { return d.y1 - d.y0; })
                .on("mouseover", function(event, d) { showTooltip(event, d); })
                .on("mousemove", function(event) { moveTooltip(event); })
                .on("mouseout", hideTooltip);

            leaf.append("text").attr("class", "treemap-text")
                .attr("x", function(d) { return (d.x1 - d.x0) / 2; })
                .attr("y", function(d) { return (d.y1 - d.y0) / 2 - 5; })
                .text(function(d) { return d.data.name; })
                .style("font-size", function(d) { return Math.min((d.x1 - d.x0) / 8, (d.y1 - d.y0) / 4, 14) + "px"; })
                .each(function(d) {
                    var textLength = this.getComputedTextLength();
                    var availableWidth = d.x1 - d.x0 - 4;
                    if (textLength > availableWidth) {
                        var text = d.data.name;
                        var ratio = availableWidth / textLength;
                        var maxLength = Math.floor(text.length * ratio) - 3;
                        d3.select(this).text(maxLength > 0 ? text.substring(0, maxLength) + "..." : "");
                    }
                });

            leaf.append("text").attr("class", "treemap-value")
                .attr("x", function(d) { return (d.x1 - d.x0) / 2; })
                .attr("y", function(d) { return (d.y1 - d.y0) / 2 + 10; })
                .text(function(d) { return formatValue(d.data.value); })
                .style("font-size", function(d) { return Math.min((d.x1 - d.x0) / 10, (d.y1 - d.y0) / 6, 12) + "px"; })
                .style("display", function(d) { return (d.y1 - d.y0) < 30 ? "none" : "block"; });

            if (data.children) {
                svg.selectAll(".group-rect").data(root.children || []).join("rect")
                    .attr("x", function(d) { return d.x0; }).attr("y", function(d) { return d.y0; })
                    .attr("width", function(d) { return d.x1 - d.x0; }).attr("height", function(d) { return d.y1 - d.y0; })
                    .attr("fill", "none").attr("stroke", "#333").attr("stroke-width", 2)
                    .attr("stroke-dasharray", "3,3").style("pointer-events", "none");

                svg.selectAll(".group-label").data(root.children || []).join("text")
                    .attr("class", "group-label")
                    .attr("x", function(d) { return d.x0 + 5; }).attr("y", function(d) { return d.y0 + 15; })
                    .text(function(d) { return d.data.name; })
                    .style("display", function(d) { return (d.x1 - d.x0) < 50 ? "none" : "block"; });
            }
        }

        function showTooltip(event, d) {
            var tt = document.getElementById('tooltip');
            var pct = ((d.data.value / root.value) * 100).toFixed(1);
            tt.innerHTML = '<strong>' + d.data.name + '</strong><br>Value: ' + formatValue(d.data.value) +
                (d.data.category ? '<br>Category: ' + d.data.category : '') +
                '<br>Percentage: ' + pct + '%' +
                (d.parent ? '<br>Parent: ' + d.parent.data.name : '');
            tt.style.opacity = 1;
            moveTooltip(event);
        }

        function moveTooltip(event) {
            var tt = document.getElementById('tooltip');
            tt.style.left = (event.pageX + 10) + 'px';
            tt.style.top = (event.pageY - 10) + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').style.opacity = 0; }

        function renderData(data) {
            document.getElementById('loadingIndicator').classList.add('hidden');
            currentData = data;
            initializeTreemap();
            updateTreemap(data);
            setTimeout(reportSize, 100);
        }

        function extractData(msg) {
            if (msg.params && msg.params.structuredContent && msg.params.structuredContent.data) return msg.params.structuredContent.data;
            if (msg.params && msg.params.structuredContent && msg.params.structuredContent.name) return msg.params.structuredContent;
            if (msg.params && msg.params.arguments && msg.params.arguments.data) return msg.params.arguments.data;
            if (msg.params && msg.params.arguments && msg.params.arguments.name) return msg.params.arguments;
            return null;
        }

        window.addEventListener('message', function(event) {
            var msg = event.data;
            if (!msg || msg.jsonrpc !== "2.0") return;
            if (msg.method === 'ui/notifications/tool-result' || msg.method === 'ui/notifications/tool-input') {
                var data = extractData(msg);
                if (data) renderData(data);
            }
            if (msg.method === 'ui/notifications/host-context-changed') applyTheme(msg.params);
            if (msg.method === 'ui/resource-teardown' && msg.id) {
                window.parent.postMessage({ jsonrpc: "2.0", id: msg.id, result: {} }, '*');
            }
        });

        var appIdentity = { name: "autovisualiser-treemap", version: "1.0.0" };
        sendRequest("ui/initialize", {
            protocolVersion: "2026-01-26",
            appInfo: appIdentity, clientInfo: appIdentity,
            appCapabilities: { availableDisplayModes: ["inline", "fullscreen"] }, capabilities: {}
        }).then(function(result) {
            applyTheme(result.hostContext || result);
            sendNotification("ui/notifications/initialized", {});
            reportSize();
        }).catch(function(err) {
            console.warn('[autovisualiser-treemap] ui/initialize failed:', err);
            reportSize();
        });
    })();
    </script>
</body>
</html>
