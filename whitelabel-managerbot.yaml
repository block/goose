# =============================================================================
# Managerbot — white-labeled Goose for Square merchants
# =============================================================================
# Build:  WHITELABEL_CONFIG=/path/to/whitelabel-managerbot.yaml npm run make
# Dev:    WHITELABEL_CONFIG=/path/to/whitelabel-managerbot.yaml just run-ui-whitelabel
# =============================================================================

branding:
  appName: "Managerbot"
  tagline: "Your AI COO for Square"

  greetings:
    - "Hey! What can I help you with today?"
    - "Ready to dig into your business data."
    - "What would you like to know about your store?"
    - "Let's get things done."

  starterPrompts:
    - icon: "bar-chart"
      label: "Sales report"
      description: "Net sales are up 11% compared to last week. Review the breakdown by location and channel."
      prompt: "Show me my sales for the past week broken down by location"
      action: "Review →"
    - icon: "users"
      label: "Customer insights"
      description: "Customer count is steady but average ticket size dropped 3%. Identify your top regulars."
      prompt: "Who are my top customers and what do they typically buy?"
      action: "Review →"
    - icon: "package"
      label: "Catalog health"
      description: "12 items are missing descriptions and 3 have no pricing set. Stay ahead of catalog issues."
      prompt: "Check my catalog for missing descriptions, images, or pricing issues"
      action: "Review →"

  homeScreen:
    showStats: false
    showRecentChats: true
    showInsightCards: true

features:
  updatesEnabled: false
  costTrackingEnabled: false
  announcementsEnabled: false
  configurationEnabled: false
  telemetryUiEnabled: false

  navigation:
    - home
    - chat
    - settings

  settingsTabs:
    - models
    - chat

  hiddenSettingSections:
    - external-backend
    - tunnel
    - session-sharing
    - telemetry
    - update
    - navigation-customization

  allowedProviders:
    - anthropic
    # - custom_kgoose  # uncomment when service auth is available

defaults:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"

  # # kgoose provider — uncomment when service auth works
  # providerDefinition:
  #   id: "custom_kgoose"
  #   displayName: "kgoose (Square AI)"
  #   engine: "openai"
  #   apiUrl: "http://localhost:8080"
  #   models:
  #     - "kgoose-square"
  #   requiresAuth: false
  #   supportsStreaming: false

  extensions:
    - name: developer
      type: builtin
      enabled: true
    - name: computercontroller
      type: builtin
      enabled: false
    - name: chatrecall
      type: builtin
      enabled: false
    - name: todo
      type: platform
      enabled: false
    - name: apps
      type: platform
      enabled: false

  systemPrompt: |
    You are Managerbot — an AI COO for Square merchants. You help merchants
    understand their business and manage operations through the Square platform.

    ## How to use the square CLI

    The `square` binary is available on PATH.
    Run `square <resource> help` for detailed usage on any resource.

    Available resources:
      square merchants list|get          — Merchant account info
      square locations list|get|create|update  — Business locations
      square channels list|get           — Sales channels
      square customers list|get|create|update|delete|search  — Customer profiles
      square customer-groups list|get|create|update|delete   — Customer groups
      square customer-segments list|get  — Customer segments
      square customer-custom-attrs ...   — Custom attributes
      square catalog list|get|search|upsert|delete  — Items, categories, taxes, images
      square reporting meta|query        — Analytics via Cube API
      square managerbot tasks list|get|create|update|activity  — Task management
      square managerbot mutations list|get  — Staged mutation management

    ## Key rules

    - **Reads pass through** — list, get, search commands return live data from Square.
    - **Writes are staged** — create, update, delete commands return a staged mutation (status: pending).
      The merchant must approve mutations before they execute. Do NOT tell the merchant the write succeeded.
      Tell them what you proposed and that it needs their approval.
    - Always start by understanding the merchant's data: `square merchants get me`, `square locations list`.
    - Use `square reporting meta` to discover available analytics before querying.
    - Keep responses concise. Show data in tables or lists when appropriate.

  skills:
    - name: "Catalog Health Check"
      description: "Run a diagnostic audit of a merchant's product catalog to find missing fields, duplicates, and data quality problems."
      path: "/Users/micn/Development/managerbot2-poc/sandbox/skills/catalog-health-check"
    - name: "Catalog Optimization"
      description: "Generate prioritized, sales-weighted recommendations to improve catalog images, pricing strategy, and category organization."
      path: "/Users/micn/Development/managerbot2-poc/sandbox/skills/catalog-optimization"
    - name: "Data Analysis"
      description: "Analyze merchant data, generate charts, and deliver reports."
      path: "/Users/micn/Development/managerbot2-poc/sandbox/skills/data-analysis"
    - name: "Email Campaign"
      description: "Create and review Square Email Marketing campaigns with catalog research, brand-voice alignment, and inline preview."
      path: "/Users/micn/Development/managerbot2-poc/sandbox/skills/email-campaign"

  tools:
    - name: "square"
      description: "Square merchant CLI — interact with Square APIs through the Managerbot server"
      path: "square"

processes:
  # 1. Start the managerbot API server (long-running daemon)
  - name: "managerbot-server"
    command: "managerbot-server"
    args: ["serve"]
    env:
      SQUARE_BASE_URL: "https://connect.squareupstaging.com"
    restartOnCrash: true
    waitForPort: 8080
    waitTimeoutMs: 20000

  # 2. Run OAuth flow (short-lived — opens browser, merchant logs in, returns token)
  - name: "square-auth"
    command: "square"
    args: ["auth"]
    env:
      SQUARE_BASE_URL: "https://connect.squareupstaging.com"
      MANAGERGOOSE_CLIENT_ID: "sq0ids-2nnfRUeYdZC1R7LHWjC38Q"
      MANAGERGOOSE_CLIENT_SECRET: "sq0css-Z7LoqlmaL_tq68b0VXLlm5bNpI2g0tgTHhAq1AN4I0U"
    envFromOutput:
      access_token: "SQUARE_ACCESS_TOKEN"
    envFromOutputTimeoutMs: 120000

window:
  width: 1100
  height: 850
  minWidth: 500

# Theme token overrides — applied on top of the base theme
theme:
  dark:
    "--color-background-primary": "#0f0f0f"
    "--color-background-secondary": "#1a1a1a"
    "--color-text-info": "#4ade80"
  base:
    "--font-sans": "'Inter', 'Cash Sans', sans-serif"
