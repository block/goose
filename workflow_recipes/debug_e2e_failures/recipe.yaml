version: 1.0.0
title: Debug E2E Test Failures
description: Analyze failed E2E tests, diagnose root causes, and propose fixes

instructions: |
  You are debugging E2E test failures for a desktop Electron app.
  Follow the debug-e2e skill for the diagnosis workflow.

prompt: |
  Follow the Steps to perform debug task one by one
  {% if test_name %}
  Focus on this specific test: {{ test_name }}
  {% endif %}
  {% if results_url %}
  Download test results from: {{ results_url }}
  {% endif %}

parameters:
  - key: test_name
    input_type: string
    requirement: optional
    default: ""
    description: Specific test name to debug. If not provided, analyzes all failures from test-results.json.
  - key: results_url
    input_type: string
    requirement: optional
    default: ""
    description: URL to a test results zip file (e.g., from CI). If provided, downloads and uses these results instead of local ones.

extensions:
  - type: platform
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    bundled: true
  - type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  - type: platform
    name: computercontroller
    display_name: Computer Controller
    bundled: true
  - type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
settings:
   temperature: 0
