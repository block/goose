name: goose Auto PR Review

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: goose-auto-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: ghcr.io/block/goose:latest
      options: --user root
      env:
        GOOSE_PROVIDER: ${{ vars.GOOSE_PROVIDER || 'anthropic' }}
        GOOSE_MODEL: ${{ vars.GOOSE_MODEL || 'claude-sonnet-4-20250514' }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        HOME: /tmp/goose-home
        GOOSE_SHELL_ENV_SCRUB: ANTHROPIC_API_KEY,GITHUB_TOKEN
        GOOSE_SKIP_CONTEXT_FILES: AGENTS.md
        GOOSE_SHELL_ALLOWED_COMMANDS: cat,grep,rg,head,tail,wc,ls,find,git

    steps:
      - name: Checkout base branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install tools
        run: |
          apt-get update
          apt-get install -y gettext curl ripgrep
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update
          apt-get install -y gh

      - name: Get PR metadata and diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ toJson(github.event.pull_request) }}
        run: |
          printf '%s' "$PR_JSON" > /tmp/pr.json
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > /tmp/pr.diff

      - name: Run goose review
        id: goose
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          mkdir -p "$HOME/.local/share/goose/sessions"
          mkdir -p "$HOME/.config/goose"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          export PR_NUMBER PR_TITLE
          cat > /tmp/recipe.yaml << 'RECIPE_HEREDOC'
          version: "1.0.0"
          title: "Review Pull Request"
          description: "Automated PR review"

          extensions:
            - type: builtin
              name: developer

          instructions: |
            You are a code reviewer. Evaluate code, don't implement changes.
            Be constructive, specific, and verify claims with evidence.

            ## Issue Categories
            - 🔴 BLOCKING: Must fix. Requires HIGH confidence + code evidence.
            - 🟡 WARNING: Should fix. MEDIUM+ confidence.
            - 🟢 SUGGESTION: Nice to have. Can be speculative if labeled.
            - ✅ HIGHLIGHT: Good practices to acknowledge.

            ## Anti-hallucination
            - Search with rg before claiming something is "missing"
            - Say "I couldn't verify" not "this is wrong"
            - 2 verified issues are better than 10 speculative ones

            Do NOT run cargo check, cargo test, cargo fmt, or other build commands.
            CI pipelines already validate those. Focus on code review only.
            Do NOT make any changes to the codebase.
          RECIPE_HEREDOC

          # Prompt needs variable interpolation so use a separate heredoc
          cat >> /tmp/recipe.yaml << PROMPT_HEREDOC

          prompt: |
            Review PR #${PR_NUMBER}: ${PR_TITLE}

            The PR metadata is saved at /tmp/pr.json
            The PR diff is saved at /tmp/pr.diff

            The base branch is checked out. Use rg and file reads for context.

            Write your review to /tmp/pr_review.md with this format:

            **Summary**: 1-2 sentence overview of the PR and your assessment.

            Only include sections below if they have content. Omit empty sections.

            **🔴 Blocking Issues**
            [Must have file:line and evidence.]

            **🟡 Warnings**

            **🟢 Suggestions**

            **✅ Highlights**

            ---
            *Review generated by goose*

            Only write /tmp/pr_review.md when the review is complete.
          PROMPT_HEREDOC

          goose run --recipe /tmp/recipe.yaml

          if [ -f /tmp/pr_review.md ]; then
            echo "has_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment
        if: steps.goose.outputs.has_review == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/pr_review.md

      - name: Post failure comment
        if: failure() || steps.goose.outputs.has_review != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "⚠️ goose PR review could not be completed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
