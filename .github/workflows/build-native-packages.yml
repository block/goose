name: Build Native Packages

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the artifact containing all native binaries"
        value: ${{ jobs.collect.outputs.artifact-name }}
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'crates/goose/**'
      - 'crates/goose-cli/**'
      - 'crates/goose-acp/**'
      - 'ui/acp/**'
      - 'ui/text/**'
      - '.github/workflows/build-native-packages.yml'
  pull_request:
    paths:
      - 'crates/goose/**'
      - 'crates/goose-cli/**'
      - 'crates/goose-acp/**'
      - 'ui/acp/**'
      - 'ui/text/**'
      - '.github/workflows/build-native-packages.yml'

jobs:
  download-artifacts:
    name: Download pre-built artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - win32-x64

    steps:
      - name: Download artifact from specific run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download artifact from the specific workflow run
          gh run download 23552237582 \
            --repo block/goose \
            --name goose-${{ matrix.platform }} \
            --dir artifact

      - name: Verify artifact
        run: |
          echo "Downloaded artifact structure:"
          ls -R artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: goose-${{ matrix.platform }}
          path: artifact/
          if-no-files-found: error
          retention-days: 7

  collect:
    name: Collect all binaries
    runs-on: ubuntu-latest
    needs: download-artifacts
    outputs:
      artifact-name: native-binaries-all

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: native-binaries

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -R native-binaries/

      - name: Upload combined artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-binaries-all
          path: native-binaries/
          if-no-files-found: error
          retention-days: 7
