name: Test Intel Signing (Temp)
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to bundle app from'
        required: true
        type: string
jobs:
  test-intel-signing:
    uses: ./.github/workflows/bundle-desktop-intel.yml
    permissions:
      id-token: write
      contents: read
    with:
      signing: true
      ref: ${{ inputs.branch }}
    secrets:
      OSX_CODESIGN_ROLE: ${{ secrets.OSX_CODESIGN_ROLE }}
