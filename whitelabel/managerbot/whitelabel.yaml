# =============================================================================
# Managerbot — white-labeled Goose for Square merchants
# =============================================================================
# Build:  WHITELABEL_CONFIG=/path/to/whitelabel-managerbot.yaml npm run make
# Dev:    WHITELABEL_CONFIG=/path/to/whitelabel-managerbot.yaml just run-ui-whitelabel
# =============================================================================

branding:
  appName: "Managerbot"
  tagline: "Your AI COO for Square"
  logo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'%3E%3Crect width='64' height='64' rx='12' fill='%23101010'/%3E%3Crect x='18' y='18' width='28' height='28' rx='4' stroke='white' stroke-width='4' fill='none'/%3E%3Crect x='27' y='27' width='10' height='10' rx='2' fill='white'/%3E%3C/svg%3E"

  greetings:
    - "Hey! What can I help you with today?"
    - "Ready to dig into your business data."
    - "What would you like to know about your store?"
    - "Let's get things done."

  starterPrompts:
    - icon: "bar-chart"
      label: "Sales report"
      description: "Net sales are up 11% compared to last week. Review the breakdown by location and channel."
      prompt: "Show me my sales for the past week broken down by location"
      action: "Review →"
    - icon: "users"
      label: "Customer insights"
      description: "Customer count is steady but average ticket size dropped 3%. Identify your top regulars."
      prompt: "Who are my top customers and what do they typically buy?"
      action: "Review →"
    - icon: "package"
      label: "Catalog health"
      description: "12 items are missing descriptions and 3 have no pricing set. Stay ahead of catalog issues."
      prompt: "Check my catalog for missing descriptions, images, or pricing issues"
      action: "Review →"

  homeScreen:
    showStats: false
    showRecentChats: true
    showInsightCards: true

features:
  updatesEnabled: false
  costTrackingEnabled: false
  announcementsEnabled: false
  configurationEnabled: false
  telemetryUiEnabled: false


  navigation:
    - home
    - chat
    - apps
    - settings
  showModelSelector: false

  settingsTabs:
    - chat
    - sharing
    - keyboard
    - app

  hiddenSettingSections:
    - session-sharing
    - external-backend

  allowedProviders:
    - anthropic
    # - custom_kgoose  # uncomment when service auth is available

defaults:
  provider: "anthropic"
  model: "claude-opus-4-6"

  # # kgoose provider — uncomment when service auth works
  # providerDefinition:
  #   id: "custom_kgoose"
  #   displayName: "kgoose (Square AI)"
  #   engine: "openai"
  #   apiUrl: "http://localhost:8080"
  #   models:
  #     - "kgoose-square"
  #   requiresAuth: false
  #   supportsStreaming: false

  extensions:
    - name: developer
      type: builtin
      enabled: true
    - name: autovisualiser
      type: builtin
      enabled: false
    - name: computercontroller
      type: builtin
      enabled: false
    - name: chatrecall
      type: builtin
      enabled: false
    - name: todo
      type: platform
      enabled: false
    - name: code_execution
      type: platform
      enabled: true
    - name: apps
      type: platform
      enabled: true

  systemPrompt: |
    You're Managerbot — an AI COO for Square merchants. You exist to 1/ proactively make merchants smarter about their business and 2/ solve and automate operational problems and reduce toil.

    Answer what the merchant asks. Don't preamble, don't run orientation commands first. If they ask about sales, go get sales. If you need a location ID, get it as part of the work — don't make it a separate step.

    # `square` CLI

    The `square` CLI talks to Square APIs through the managerbot server. Every resource has a `help` command with detailed usage, flags, body schemas, and working examples.

    Run `square <resource> help` if you're unsure about flags or body format. The help text is the source of truth for exact syntax.

    | Resource | Help command | What it does |
    |----------|-------------|--------------|
    | merchants | `square merchants help` | Merchant account info |
    | locations | `square locations help` | Business locations |
    | channels | `square channels help` | Sales channels |
    | customers | `square customers help` | Customer profiles (CRUD, search, bulk) |
    | customer-groups | `square customer-groups help` | Customer groups |
    | customer-segments | `square customer-segments help` | Customer segments |
    | customer-custom-attrs | `square customer-custom-attrs help` | Custom attributes |
    | catalog | `square catalog help` | Items, categories, taxes, discounts, images |
    | inventory | `square inventory help` | Stock counts, adjustments, transfers |
    | orders | `square orders help` | Orders (search, get, create) |
    | labor | `square labor help` | Shifts, timecards, break types |
    | team | `square team help` | Team members, jobs, wages |
    | stock-orders | `square stock-orders help` | Purchase orders and transfers |
    | vendors | `square vendors help` | Vendors/suppliers |
    | reporting | `square reporting help` | Analytics via Reporting API |
    | loyalty | `square loyalty help` | Loyalty programs, accounts, rewards |
    | email-campaigns | `square email-campaigns help` | Email marketing |
    | sites | `square sites help` | Square Online sites |
    | managerbot tasks | `square managerbot tasks help` | Task management |
    | managerbot mutations | `square managerbot mutations help` | Staged mutations |

    Pagination: if a response contains a `cursor` field, call again with `--cursor <value>`. Keep paging until cursor is absent. Don't assume one call returns everything.

    Reads pass through — list, get, search return live data.
    Writes are staged — create, update, delete return a staged mutation (pending). Tell the merchant what you proposed and that it needs their approval.

    # Skills

    Skills are bundled folders with a `SKILL.md` and supporting scripts. Read the SKILL.md before starting work that matches a skill's purpose. Follow the steps exactly.

    # Data conventions

    | Phrase | Range |
    |--------|-------|
    | "last 7 days" | 7 days before today |
    | "past month" | 31 days before today |
    | "last week" | Most recent complete Sun–Sat week |
    | "this week" | Current Sun–Sat week (partial) |
    | "last month" | Previous full calendar month |
    | "this month" | Current month, 1st–yesterday |
    | "YTD" | Jan 1–yesterday |

    Exclude today (incomplete data). Use absolute dates in responses.
    Morning 6 AM–noon · Afternoon noon–5 PM · Evening 5 PM–6 AM · Holiday season: Nov–Jan

    # Voice & tone

    Informative, concise, straightforward — like a trusted business partner. Speak as equals. Crisp but not boastful. Warm but not too casual.

    # Formatting

    Present data as rich reports. Use markdown tables for comparisons and breakdowns. Use **bold** for key numbers and metrics. Use headers (##, ###) to structure multi-section responses. Use bullet lists for action items. Prefer human-readable names over identifiers — never show raw IDs unless asked.

    Keep it scannable — a merchant should get the headline number in the first line, then the breakdown below. Don't pad with filler text.

    For charts and visuals: write a script to generate the image, base64-encode it, and embed it as a data URI in your response: `![caption](data:image/png;base64,...)`. This renders inline in chat. Use this for trend lines, bar charts, pie charts — anything that tells the story better than a table.

    # Delight mandate

    Get creative and proactively problem solve. Go above and beyond when it serves the work. You have bash and you can code — use them.

  skills:
    - name: "Catalog Health Check"
      description: "Diagnostic audit of a merchant's product catalog — missing fields, duplicates, data quality."
      path: "./skills/catalog-health-check"
    - name: "Catalog Optimization"
      description: "Prioritized recommendations to improve catalog images, pricing, and categories."
      path: "./skills/catalog-optimization"
    - name: "Email Campaign"
      description: "Create Square Email Marketing campaigns with catalog research and brand-voice alignment."
      path: "./skills/email-campaign"
    - name: "Square Design Guidelines"
      description: "Square brand-faithful visuals. Review before producing any visual medium."
      path: "./skills/square-design-guidelines"

  tools:
    - name: "square"
      description: "Square merchant CLI — interact with Square APIs through the Managerbot server"
      path: "square"

processes:
  # 1. Start the managerbot API server (long-running daemon)
  - name: "managerbot-server"
    command: "managerbot-server"
    args: ["serve"]
    env:
      SQUARE_BASE_URL: "https://connect.squareupstaging.com"
    restartOnCrash: true
    waitForPort: 8080
    waitTimeoutMs: 20000

  # 2. Run OAuth flow (short-lived — opens browser, merchant logs in, returns token)
  - name: "square-auth"
    command: "square"
    args: ["auth"]
    env:
      SQUARE_BASE_URL: "https://connect.squareupstaging.com"
      MANAGERGOOSE_CLIENT_ID: "sq0ids-2nnfRUeYdZC1R7LHWjC38Q"
      MANAGERGOOSE_CLIENT_SECRET: "sq0css-Z7LoqlmaL_tq68b0VXLlm5bNpI2g0tgTHhAq1AN4I0U"
    envFromOutput:
      access_token: "SQUARE_ACCESS_TOKEN"
    envFromOutputTimeoutMs: 120000

window:
  width: 1100
  height: 850
  minWidth: 500

# Theme token overrides — applied on top of the base theme
theme:
  dark:
    "--color-background-primary": "#0f0f0f"
    "--color-background-secondary": "#1a1a1a"
    "--color-text-info": "#4ade80"
  base:
    "--font-sans": "'Inter', 'Cash Sans', sans-serif"
