version: 1.0.0
title: "Procurement Approval Agent"
description: "Automates procurement request processing with human-in-the-loop approval workflows. Reviews purchase requests, validates against budget thresholds, and routes to the appropriate approver before executing."
instructions: "This recipe creates a procurement approval agent that processes purchase requests end-to-end. It reads incoming procurement requests, checks them against budget rules and policies, presents a summary to a human approver, waits for approval or rejection, and then either proceeds with the purchase workflow or notifies the requester of the rejection."
author:
  contact: "VasuBansal7576"
extensions:
  - type: builtin
    name: developer
activities:
  - "Parse and validate incoming procurement requests"
  - "Check request against budget thresholds and approval policies"
  - "Present a human-readable summary and request approval"
  - "Execute or reject the procurement workflow based on human decision"
prompt: |
  You are a Procurement Approval Agent. Your job is to process purchase requests with a human-in-the-loop approval step.

  Here is the procurement request to process:

  Requester: {{ requester_name }}
  Item/Service: {{ item_description }}
  Vendor: {{ vendor_name }}
  Amount: ${{ amount }}
  Business Justification: {{ justification }}

  Follow these steps:

  1. VALIDATE the request:
     - Check that all required fields are present
     - Flag any missing or suspicious information

  2. POLICY CHECK:
     - If amount <= ${{ auto_approve_threshold }}, note it is within auto-approval limits
     - If amount > ${{ auto_approve_threshold }}, note it requires manager approval
     - Check if the vendor name appears legitimate

  3. SUMMARIZE for the approver:
     - Present a clear, concise summary of the request
     - Highlight any concerns or policy flags
     - Show the total budget impact

  4. REQUEST HUMAN APPROVAL:
     - Ask the approver to type APPROVE or REJECT
     - If APPROVE: confirm the procurement is authorized and provide a reference number
     - If REJECT: ask for a rejection reason and draft a polite notification email to the requester

  5. OUTPUT the final decision with timestamp and approver confirmation.

parameters:
  - key: requester_name
    input_type: string
    requirement: required
    description: "Full name of the person submitting the procurement request"
  - key: item_description
    input_type: string
    requirement: required
    description: "Description of the item or service being requested"
  - key: vendor_name
    input_type: string
    requirement: required
    description: "Name of the vendor or supplier"
  - key: amount
    input_type: string
    requirement: required
    description: "Total cost of the procurement request in USD"
  - key: justification
    input_type: string
    requirement: required
    description: "Business justification for the purchase"
  - key: auto_approve_threshold
    input_type: string
    requirement: optional
    description: "Dollar amount below which requests can be auto-approved"
    default: "500"
